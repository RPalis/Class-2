<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Page setup: metadata, stylesheet, and React/Babel dependencies -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans — JSX version</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- React mount point: app UI renders inside this container -->
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        // ===== Reusable UI blocks =====
        // Button component: shared CTA style with a switchable visual variant.
        function Button({ label, variant = "secondary" }) {
            return (
                // Combines the base button class with the selected variant.
                <button className={`download-button ${variant}`}>{label}</button>
            );
        }

        // Pricing card component: same visual card, powered by props.
        function PricingCard({ title, price, includesText, features, buttonText, buttonVariant }) {
            return (
                <div className="card">
                    {/* Dynamic text values come from the plan data objects */}
                    <h1 className="card-title">{title}</h1>
                    <p className="card-price">{price}</p>
                    <div className="card-content">
                        <p className="includes-text">{includesText}</p>
                        <ul className="features-list">
                            {/* Loops through each feature and renders a checklist row */}
                            {features.map((feature, i) => (
                                <li key={i}>
                                    <i data-lucide="check" className="checkmark" aria-hidden="true"></i>
                                    {feature}
                                </li>
                            ))}
                        </ul>
                    </div>
                    {/* Reuses the shared Button component for card actions */}
                    <Button label={buttonText} variant={buttonVariant} />
                </div>
            );
        }

        // ===== Page composition =====
        function App() {
            // Plan content lives in objects so layout and content stay separate.
            const hobbyPlan = {
                title: 'Hobby',
                price: 'Free',
                includesText: 'Includes:',
                features: ['No credit card required', 
                'Limited Agent requests',  
                'Limited Tab completions',
                'agent awesome'
                ],
                buttonText: 'Start for free',
                buttonVariant: 'tertiary',
            };
            const proPlan = {
                title: 'Pro',
                price: '$20/mo.',
                includesText: 'Everything in Hobby, plus:',
                features: [
                    'Extended limits on Agent',
                    'Unlimited Tab completions',
                    'Background Agents',
                    'Maximum context windows',
                ],
                buttonText: 'Get Pro',
                buttonVariant: 'primary',
            };
            const ExtendedPlan = {
                title: 'Extended',
                price: '$30/mo.',
                includesText: 'Everything in Pro, plus:',
                features: [
                    'Extended limits on Agent',
                    'Unlimited Tab completions',
                    'Background Agents'
                ],
                buttonText: 'Get Extended',
                buttonVariant: 'primary',
            };
            const EnterprisePlan = {
                title: 'Enterprise',
                price: 'Custom.',
                includesText: 'Everything in Pro, plus:',
                features: [
                    'Priority support',
                    'Advanced team controls',
                    'Custom security policies',
                    'Dedicated onboarding',
                ],
                buttonText: 'Contact Sales',
                buttonVariant: 'primary',
            };

            return (
                <>
                    {/* Page label to identify this implementation variant */}
                    <p className="page-label"><strong>JSX version</strong> — same UI, built with components</p>
                    <div className="cards-container">
                        {/* Spread syntax passes each plan object into one reusable card component */}
                        <PricingCard {...hobbyPlan} />
                        <PricingCard {...proPlan} />
                        <PricingCard {...ExtendedPlan} />
                        <PricingCard {...EnterprisePlan} />

                    </div>
                </>
            );
        }

        // ===== App startup =====
        // Mounts React app into #root and initializes Lucide icons.
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        lucide.createIcons();
    </script>
</body>
</html>
